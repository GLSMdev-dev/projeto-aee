name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Generate config.js from template
        run: |
          # Gerar config.js substituindo placeholders pelos secrets
          sed -e "s|{{API_URL}}|${{ secrets.API_URL }}|g" \
              -e "s|{{DEPLOYMENT_ID}}|${{ secrets.DEPLOYMENT_ID }}|g" \
              -e "s|{{SPREADSHEET_ID}}|${{ secrets.SPREADSHEET_ID }}|g" \
              -e "s|{{API_KEY}}|${{ secrets.API_KEY }}|g" \
              -e "s|{{PUBLIC_URL}}|${{ secrets.PUBLIC_URL }}|g" \
              js/config.template.js > js/config.js
          
          echo "✅ config.js gerado com secrets"
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
