<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema AEE - Gerenciar Usuário</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="loading" class="loading"><div class="spinner"></div></div>

  <nav class="navbar">
    <h1>🏫 Sistema AEE - Usuários</h1>
    <div class="nav-links">
      <a href="admin.html">← Voltar</a>
    </div>
  </nav>

  <div class="container">
    <div class="card">
      <div class="card-header">
        <h2 id="formTitle">👤 Cadastro de Usuário</h2>
      </div>
      
      <form id="formUsuario">
        <input type="hidden" id="usuarioId" value="">
        
        <div class="form-row">
          <div class="form-group"><label for="nome">Nome completo *</label><input type="text" id="nome" required></div>
          <div class="form-group"><label for="email">E-mail *</label><input type="email" id="email" required></div>
        </div>
        
        <div class="form-row">
          <div class="form-group"><label for="username">Usuário (login) *</label><input type="text" id="username" required></div>
          <div class="form-group"><label for="senha">Senha *</label><input type="password" id="senha" required></div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="perfil">Perfil *</label>
            <select id="perfil" required>
              <option value="professor">Professor</option>
              <option value="gestor">Gestor</option>
              <option value="adm">Administrador</option>
            </select>
          </div>
          <div class="form-group">
            <label for="activityStatus">Status</label>
            <select id="activityStatus">
              <option value="true">Ativo</option>
              <option value="false">Inativo</option>
            </select>
          </div>
        </div>
        
        <div class="form-group">
          <button type="submit" class="btn btn-primary">💾 Salvar</button>
          <button type="button" class="btn" onclick="window.location.href='admin.html'">Cancelar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api-netlify.js"></script>
  <script>
    function getUrlParameter(name) { return new URLSearchParams(window.location.search).get(name); }

    async function carregarUsuarioParaEdicao(id) {
      mostrarLoading(true);
      try {
        const usuarios = await listar('users');
        const usuario = usuarios.find(u => u.id == id);
        if (usuario) {
          document.getElementById('formTitle').textContent = '✏️ Editar Usuário';
          document.getElementById('usuarioId').value = usuario.id;
          document.getElementById('nome').value = usuario.nome || '';
          document.getElementById('email').value = usuario.email || '';
          document.getElementById('username').value = usuario.username || '';
          document.getElementById('perfil').value = usuario.perfil || 'professor';
          document.getElementById('activityStatus').value = usuario.activityStatus === 'true' ? 'true' : 'false';
          document.getElementById('senha').required = false;
          document.getElementById('senha').placeholder = 'Deixe em branco para manter a mesma';
        }
      } catch (error) { console.error(error); }
      finally { mostrarLoading(false); }
    }

    document.getElementById('formUsuario').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('usuarioId').value;
      const usuario = {
        nome: document.getElementById('nome').value,
        email: document.getElementById('email').value,
        username: document.getElementById('username').value,
        perfil: document.getElementById('perfil').value,
        activityStatus: document.getElementById('activityStatus').value === 'true'
      };
      
      const senha = document.getElementById('senha').value;
      if (senha) usuario.senha = senha;
      
      if (!usuario.nome || !usuario.email || !usuario.username) {
        mostrarMensagem('Preencha todos os campos obrigatórios', 'warning');
        return;
      }
      
      mostrarLoading(true);
      try {
        if (id) {
          await atualizarUser(id, usuario);
          mostrarMensagem('Usuário atualizado!', 'success');
        } else {
          if (!senha) { mostrarMensagem('Senha obrigatória para novo usuário', 'warning'); return; }
          await criarUser(usuario);
          mostrarMensagem('Usuário criado!', 'success');
        }
        setTimeout(() => window.location.href = 'admin.html', 1000);
      } catch (error) {
        mostrarMensagem('Erro ao salvar usuário', 'error');
      } finally { mostrarLoading(false); }
    });

    const usuarioId = getUrlParameter('id');
    if (usuarioId) carregarUsuarioParaEdicao(usuarioId);
  </script>
</body>
</html>
