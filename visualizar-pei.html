<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sistema AEE - Visualizar PEI</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    .pei-container { background: white; max-width: 1100px; margin: 0 auto; padding: 2rem; box-shadow: var(--shadow-hover); border-radius: var(--border-radius); }
    .pei-header { text-align: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 3px solid var(--primary); }
    .pei-header h1 { color: var(--primary); font-size: 1.8rem; }
    .pei-header h2 { color: var(--secondary); font-size: 1.2rem; font-weight: normal; }
    .info-escola { background: var(--primary-light); padding: 1rem; border-radius: var(--border-radius); margin-bottom: 1.5rem; text-align: center; }
    .info-estudante-card { background: var(--gray-100); padding: 1.2rem; border-radius: var(--border-radius); margin-bottom: 1.5rem; border-left: 4px solid var(--primary); }
    .info-estudante-card h3 { color: var(--primary); margin-bottom: 0.8rem; }
    .grid-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 0.8rem; }
    .info-label { font-weight: 600; color: var(--gray-600); font-size: 0.8rem; text-transform: uppercase; }
    .info-value { font-size: 1rem; color: var(--black); }
    .secao-pei { margin-bottom: 1.8rem; page-break-inside: avoid; }
    .secao-pei h3 { background: var(--primary); color: white; padding: 0.6rem 1rem; border-radius: var(--border-radius); margin-bottom: 1rem; font-size: 1.1rem; }
    .secao-pei h4 { color: var(--secondary-dark); margin: 0.8rem 0 0.4rem; }
    .lista-conteudo { padding-left: 1.5rem; margin: 0.5rem 0; }
    .lista-conteudo li { margin: 0.3rem 0; line-height: 1.4; }
    .badge-container { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
    .badge { background: var(--primary-light); color: var(--primary-dark); padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.85rem; border: 1px solid var(--primary); }
    .texto-livre { background: var(--gray-100); padding: 1rem; border-radius: var(--border-radius); white-space: pre-wrap; border-left: 3px solid var(--secondary); }
    .acoes-pdf { display: flex; gap: 1rem; justify-content: flex-end; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .btn-pdf { background: var(--danger); color: white; }
    .btn-imprimir { background: var(--secondary); color: white; }
    .btn-editar { background: var(--primary); color: white; }
    .filtro-peis { background: var(--gray-100); padding: 1rem; border-radius: var(--border-radius); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .filtro-peis label { font-weight: 600; margin: 0; }
    .filtro-peis select { padding: 0.5rem; border-radius: var(--radius-sm); border: 1px solid var(--gray-300); flex: 1; min-width: 200px; }
    @media print { .no-print { display: none !important; } .pei-container { box-shadow: none; padding: 0; } .secao-pei { break-inside: avoid; } }
  </style>
</head>
<body>
  <div id="loading" class="loading"><div class="spinner"></div></div>
  
  <nav class="navbar no-print">
    <h1>🏫 Sistema AEE - PEI</h1>
    <div class="nav-links"><a href="javascript:history.back()">← Voltar</a></div>
  </nav>
  
  <div class="container">
    <div class="acoes-pdf no-print">
      <button class="btn btn-editar" id="btnEditarPEI">✏️ Editar PEI</button>
      <button class="btn btn-imprimir" id="btnImprimir">🖨️ Imprimir</button>
      <button class="btn btn-pdf" id="btnGerarPDF">📄 Gerar PDF</button>
    </div>
    
    <div class="filtro-peis no-print" id="filtroPEIs" style="display: none;">
      <label>📋 PEIs do Estudante:</label>
      <select id="selecionarPEI"><option value="">Carregando...</option></select>
    </div>
    
    <div id="peiParaImpressao">
      <div class="pei-container" id="peiContainer"><div class="text-center">Carregando PEI...</div></div>
    </div>
  </div>
  
  <script src="js/utils.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api-netlify.js"></script>
  <script src="js/pdf.js"></script>
  <script>
    function escapeHtml(t){if(!t)return'';const e=document.createElement('div');return e.textContent=t,e.innerHTML}
    function formatarData(t){if(!t)return'';const e=new Date(t);return isNaN(e.getTime())?t:e.toLocaleDateString('pt-BR')}
    function getUrlParameter(t){return new URLSearchParams(window.location.search).get(t)}
    function formatarLista(t,e=true){if(!t)return e?'<em>Não informado</em>':'Não informado';const n=t.split('; ').filter(t=>t.trim());if(0===n.length)return e?'<em>Não informado</em>':'Não informado';if(e)return`<ul class="lista-conteudo">${n.map(t=>`<li>${escapeHtml(t)}</li>`).join('')}</ul>`;return`<div class="badge-container">${n.map(t=>`<span class="badge">${escapeHtml(t)}</span>`).join('')}</div>`}
    
    let peiAtual=null,estudanteAtual=null,listaPEIs=[];
    
    async function carregarListaPEIs(t){try{listaPEIs=await listarPEIs(t);const e=document.getElementById('selecionarPEI');if(0===listaPEIs.length){e.innerHTML='<option value="">Nenhum PEI encontrado</option>',document.getElementById('filtroPEIs').style.display='none';return}document.getElementById('filtroPEIs').style.display='flex',e.innerHTML='<option value="">-- Selecione um PEI --</option>',listaPEIs.forEach(n=>{const r=n.dataCriacao?n.dataCriacao.split(' ')[0]:'Sem data',o=n.objetivosGerais?n.objetivosGerais.substring(0,50):'Sem objetivos',a=document.createElement('option');a.value=n.id,a.textContent=`${r} - ${o}...`,e.appendChild(a)}),e.addEventListener('change',n=>{if(n.target.value){const r=listaPEIs.find(t=>t.id==n.target.value);r&&renderizarPEI(t,r.id)}})}catch(t){console.error('Erro ao carregar lista de PEIs:',t)}}
    
    async function renderizarPEI(t,e=null){mostrarLoading(true);try{const n=await listarEstudantes();if(estudanteAtual=n.find(e=>e.id==t),!estudanteAtual)throw new Error('Estudante não encontrado');const r=await listarPEIs(t);peiAtual=e?r.find(t=>t.id==e):r.length>0?r[0]:null;if(!peiAtual){document.getElementById('peiContainer').innerHTML=`<div class="pei-header"><h1>📋 Plano Educacional Individualizado</h1><h2>Atendimento Educacional Especializado (AEE)</h2></div><div class="info-escola"><strong>Secretaria Municipal/Estadual de Educação</strong><br>Educação Inclusiva - AEE</div><div class="info-estudante-card"><h3>📌 Dados do Estudante</h3><div class="grid-info"><div><span class="info-label">Nome</span><div class="info-value">${escapeHtml(estudanteAtual.nome)}</div></div><div><span class="info-label">Matrícula</span><div class="info-value">${escapeHtml(estudanteAtual.matricula||'-')}</div></div><div><span class="info-label">Data Nascimento</span><div class="info-value">${formatarData(estudanteAtual.dataNascimento)}</div></div><div><span class="info-label">Turno</span><div class="info-value">${escapeHtml(estudanteAtual.turno)}</div></div><div><span class="info-label">Ano Escolar</span><div class="info-value">${escapeHtml(estudanteAtual.anoEscolar||'-')}</div></div><div><span class="info-label">Deficiência</span><div class="info-value">${escapeHtml(estudanteAtual.deficiencia)}</div></div><div><span class="info-label">CID</span><div class="info-value">${escapeHtml(estudanteAtual.CID||'-')}</div></div></div>${estudanteAtual.descricao?`<div style="margin-top:1rem;"><span class="info-label">Observações</span><p>${escapeHtml(estudanteAtual.descricao)}</p></div>`:''}</div><div class="secao-pei"><h3>⚠️ Nenhum PEI Encontrado</h3><p style="text-align:center;padding:2rem;">Não há Plano Educacional Individualizado cadastrado.<br><br><a href="pei.html?estudanteId=${t}" class="btn btn-primary">➕ Criar PEI agora</a></p></div>`;return}let o=peiAtual.dataCriacao&&peiAtual.dataCriacao!=='undefined'&&peiAtual.dataCriacao!==''?peiAtual.dataCriacao:new Date().toLocaleDateString('pt-BR')+' '+new Date().toLocaleTimeString('pt-BR');const a=`<div class="pei-header"><h1>📋 Plano Educacional Individualizado</h1><h2>Atendimento Educacional Especializado (AEE)</h2><p style="margin-top:0.5rem;color:#6c757d;">Data: ${o}</p></div><div class="info-escola"><strong>Secretaria Municipal/Estadual de Educação</strong><br>Educação Inclusiva - AEE - PEI</div><div class="info-estudante-card"><h3>📌 Dados do Estudante</h3><div class="grid-info"><div><span class="info-label">Nome</span><div class="info-value">${escapeHtml(estudanteAtual.nome)}</div></div><div><span class="info-label">Matrícula</span><div class="info-value">${escapeHtml(estudanteAtual.matricula||'-')}</div></div><div><span class="info-label">Data Nascimento</span><div class="info-value">${formatarData(estudanteAtual.dataNascimento)}</div></div><div><span class="info-label">Turno</span><div class="info-value">${escapeHtml(estudanteAtual.turno)}</div></div><div><span class="info-label">Ano Escolar</span><div class="info-value">${escapeHtml(estudanteAtual.anoEscolar||'-')}</div></div><div><span class="info-label">Deficiência</span><div class="info-value">${escapeHtml(estudanteAtual.deficiencia)}</div></div><div><span class="info-label">CID</span><div class="info-value">${escapeHtml(estudanteAtual.CID||'-')}</div></div></div>${estudanteAtual.descricao?`<div style="margin-top:1rem;"><span class="info-label">Observações</span><p>${escapeHtml(estudanteAtual.descricao)}</p></div>`:''}</div><div class="secao-pei"><h3>🎯 Objetivos do Plano</h3><h4>Objetivos Gerais</h4>${formatarLista(peiAtual.objetivosGerais,true)}<h4>Objetivos Específicos</h4>${formatarLista(peiAtual.objetivosEspecificos,true)}</div><div class="secao-pei"><h3>🎨 Atividades Desenvolvidas</h3>${formatarLista(peiAtual.atividades,true)}</div><div class="secao-pei"><h3>⚙️ Estratégias Pedagógicas</h3>${formatarLista(peiAtual.estrategias,false)}</div><div class="secao-pei"><h3>🛠️ Recursos de Acessibilidade</h3>${formatarLista(peiAtual.recursosAcessibilidade,false)}</div>${peiAtual.materialApoio?`<div class="secao-pei"><h3>📦 Material de Apoio</h3><div class="texto-livre">${escapeHtml(peiAtual.materialApoio).replace(/\n/g,'<br>')}</div></div>`:''}${peiAtual.relatoAtendimento?`<div class="secao-pei"><h3>📝 Relato do Atendimento</h3><div class="texto-livre">${escapeHtml(peiAtual.relatoAtendimento).replace(/\n/g,'<br>')}</div></div>`:''}<div style="margin-top:2rem;padding-top:1rem;border-top:1px solid #dee2e6;text-align:center;font-size:0.8rem;"><p>Professor(a) responsável: _________________________</p></div>`;document.getElementById('peiContainer').innerHTML=a}catch(t){console.error('Erro:',t),document.getElementById('peiContainer').innerHTML=`<div class="pei-header"><h1>❌ Erro</h1></div><div class="text-center" style="padding:2rem;color:var(--danger);">${t.message}</div>`}finally{mostrarLoading(false)}}
    
    async function inicializar(){const t=getUrlParameter('estudanteId'),e=getUrlParameter('peiId');if(!t){mostrarMensagem('Estudante não identificado','error');setTimeout(()=>window.location.href='index.html',2000);return}await renderizarPEI(t,e);await carregarListaPEIs(t);document.getElementById('btnEditarPEI')?.addEventListener('click',()=>{window.location.href=`pei.html?estudanteId=${t}&peiId=${peiAtual?.id||''}`}),document.getElementById('btnImprimir')?.addEventListener('click',()=>{imprimirPEI()}),document.getElementById('btnGerarPDF')?.addEventListener('click',()=>{const e=estudanteAtual?.nome?.replace(/\s+/g,'_')||'estudante';gerarPDF('peiParaImpressao',`PEI_${e}_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.pdf`)})}
    
    inicializar()
  </script>
</body>
</html>
