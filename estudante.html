<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sistema AEE - Cadastro de Estudante</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="loading" class="loading">
    <div class="spinner"></div>
  </div>
  
  <nav class="navbar">
    <h1>🏫 Sistema AEE - PEI</h1>
    <div class="nav-links">
      <a href="index.html">← Voltar</a>
    </div>
  </nav>
  
  <div class="container">
    <div class="card">
      <div class="card-header">
        <h2 id="formTitle">➕ Cadastro de Estudante</h2>
      </div>
      
      <form id="formEstudante">
        <input type="hidden" id="estudanteId" value="">
        
        <div class="form-row">
          <div class="form-group">
            <label for="nome">Nome completo *</label>
            <input type="text" id="nome" required>
          </div>
          
          <div class="form-group">
            <label for="dataNascimento">Data de nascimento *</label>
            <input type="date" id="dataNascimento" required>
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="turno">Turno *</label>
            <select id="turno" required>
              <option value="">Selecione</option>
              <option value="Manhã">Manhã</option>
              <option value="Tarde">Tarde</option>
              <option value="Noite">Noite</option>
              <option value="Integral">Integral</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="deficiencia">Deficiência/Transtorno *</label>
            <input type="text" id="deficiencia" required placeholder="Ex: TEA, Deficiência Visual, etc.">
          </div>
        </div>
        
        <div class="form-group">
          <label for="descricao">Descrição adicional</label>
          <textarea id="descricao" rows="3" placeholder="Necessidades específicas, observações importantes..."></textarea>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="responsaveis">Responsáveis *</label>
            <input type="text" id="responsaveis" required placeholder="Nome dos pais ou responsáveis">
          </div>
          
          <div class="form-group">
            <label for="contato">Contato *</label>
            <input type="text" id="contato" required placeholder="Telefone, WhatsApp, e-mail">
          </div>
        </div>
        
        <div class="form-group">
          <button type="submit" class="btn btn-primary">💾 Salvar</button>
          <button type="button" class="btn" onclick="window.location.href='index.html'">Cancelar</button>
        </div>
      </form>
    </div>
  </div>
  
  <script src="js/utils.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api-netlify.js"></script>
  <script>
    // Obter ID da URL
    function getUrlParameter(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }
    
    // Carregar dados para edição
    async function carregarEstudanteParaEdicao(id) {
      mostrarLoading(true);
      try {
        const estudantes = await listarEstudantes();
        const estudante = estudantes.find(e => e.id == id);
        
        if (estudante) {
          document.getElementById('formTitle').textContent = '✏️ Editar Estudante';
          document.getElementById('estudanteId').value = estudante.id;
          document.getElementById('nome').value = estudante.nome || '';
          document.getElementById('dataNascimento').value = formatarDataInput(estudante.dataNascimento);
          document.getElementById('turno').value = estudante.turno || '';
          document.getElementById('deficiencia').value = estudante.deficiencia || '';
          document.getElementById('descricao').value = estudante.descricao || '';
          document.getElementById('responsaveis').value = estudante.responsaveis || '';
          document.getElementById('contato').value = estudante.contato || '';
        }
      } catch (error) {
        console.error('Erro ao carregar estudante:', error);
        mostrarMensagem('Erro ao carregar dados do estudante', 'error');
      } finally {
        mostrarLoading(false);
      }
    }
    
    // Salvar estudante
    document.getElementById('formEstudante').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const id = document.getElementById('estudanteId').value;
      const estudante = {
        nome: document.getElementById('nome').value,
        dataNascimento: document.getElementById('dataNascimento').value,
        turno: document.getElementById('turno').value,
        deficiencia: document.getElementById('deficiencia').value,
        descricao: document.getElementById('descricao').value,
        responsaveis: document.getElementById('responsaveis').value,
        contato: document.getElementById('contato').value
      };
      
      // Validações básicas
      if (!estudante.nome || !estudante.dataNascimento || !estudante.turno || 
          !estudante.deficiencia || !estudante.responsaveis || !estudante.contato) {
        mostrarMensagem('Preencha todos os campos obrigatórios (*)', 'warning');
        return;
      }
      
      mostrarLoading(true);
      
      try {
        if (id) {
          await atualizarEstudante(id, estudante);
          mostrarMensagem('Estudante atualizado com sucesso!', 'success');
        } else {
          await criarEstudante(estudante);
          mostrarMensagem('Estudante cadastrado com sucesso!', 'success');
        }
        
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
        
      } catch (error) {
        console.error('Erro ao salvar:', error);
        mostrarMensagem('Erro ao salvar estudante', 'error');
      } finally {
        mostrarLoading(false);
      }
    });
    
    // Inicialização
    const estudanteId = getUrlParameter('id');
    if (estudanteId) {
      carregarEstudanteParaEdicao(estudanteId);
    }
  </script>
</body>
</html>
