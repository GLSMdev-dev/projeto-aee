<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sistema AEE - Cadastro de Estudante</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .info-box {
      background: var(--primary-light);
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      border-left: 4px solid var(--primary);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div id="loading" class="loading">
    <div class="spinner"></div>
  </div>
  
  <nav class="navbar">
    <h1>🏫 Sistema AEE - PEI</h1>
    <div class="nav-links">
      <a href="javascript:history.back()">← Voltar</a>
    </div>
  </nav>
  
  <div class="container">
    <div class="card">
      <div class="card-header">
        <h2 id="formTitle">➕ Cadastro de Estudante</h2>
      </div>
      
      <div class="info-box">
        📌 Campos obrigatórios: Matrícula, Nome, Data de Nascimento, Turno, Deficiência, Ano Escolar
      </div>
      
      <form id="formEstudante">
        <input type="hidden" id="estudanteId" value="">
        
        <div class="form-row">
          <div class="form-group">
            <label for="matricula">Matrícula *</label>
            <input type="text" id="matricula" required placeholder="Número da matrícula">
          </div>
          <div class="form-group">
            <label for="nome">Nome completo *</label>
            <input type="text" id="nome" required>
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="dataNascimento">Data de nascimento *</label>
            <input type="date" id="dataNascimento" required>
          </div>
          <div class="form-group">
            <label for="turno">Turno *</label>
            <select id="turno" required>
              <option value="">Selecione</option>
              <option value="Manhã">Manhã</option>
              <option value="Tarde">Tarde</option>
              <option value="Noite">Noite</option>
              <option value="Integral">Integral</option>
            </select>
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="anoEscolar">Ano Escolar *</label>
            <select id="anoEscolar" required>
              <option value="">Selecione</option>
              <option value="1º Ano">1º Ano</option>
              <option value="2º Ano">2º Ano</option>
              <option value="3º Ano">3º Ano</option>
              <option value="4º Ano">4º Ano</option>
              <option value="5º Ano">5º Ano</option>
              <option value="6º Ano">6º Ano</option>
              <option value="7º Ano">7º Ano</option>
              <option value="8º Ano">8º Ano</option>
              <option value="9º Ano">9º Ano</option>
            </select>
          </div>
          <div class="form-group">
            <label for="deficiencia">Deficiência/Transtorno *</label>
            <input type="text" id="deficiencia" required placeholder="Ex: TEA, Deficiência Visual, etc.">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="CID">CID (Código Internacional de Doenças)</label>
            <input type="text" id="CID" placeholder="Ex: F84.0, H54.0">
          </div>
          <div class="form-group">
            <label for="descricao">Descrição adicional</label>
            <textarea id="descricao" rows="3" placeholder="Necessidades específicas, observações importantes..."></textarea>
          </div>
        </div>
        
        <div class="form-group">
          <button type="submit" class="btn btn-primary">💾 Salvar</button>
          <button type="button" class="btn" onclick="javascript:history.back()">Cancelar</button>
        </div>
      </form>
    </div>
  </div>
  
  <script src="js/utils.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api-netlify.js"></script>
  <script>
    function getUrlParameter(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }
    
    function formatarDataInput(dataStr) {
      if (!dataStr) return '';
      const partes = dataStr.split('/');
      if (partes.length === 3) {
        return `${partes[2]}-${partes[1]}-${partes[0]}`;
      }
      return dataStr;
    }
    
    async function carregarEstudanteParaEdicao(id) {
      mostrarLoading(true);
      try {
        const estudantes = await listarEstudantes();
        const estudante = estudantes.find(e => e.id == id);
        
        if (estudante) {
          document.getElementById('formTitle').textContent = '✏️ Editar Estudante';
          document.getElementById('estudanteId').value = estudante.id;
          document.getElementById('matricula').value = estudante.matricula || '';
          document.getElementById('nome').value = estudante.nome || '';
          document.getElementById('dataNascimento').value = formatarDataInput(estudante.dataNascimento);
          document.getElementById('turno').value = estudante.turno || '';
          document.getElementById('anoEscolar').value = estudante.anoEscolar || '';
          document.getElementById('deficiencia').value = estudante.deficiencia || '';
          document.getElementById('CID').value = estudante.CID || '';
          document.getElementById('descricao').value = estudante.descricao || '';
        }
      } catch (error) {
        console.error('Erro ao carregar estudante:', error);
        mostrarMensagem('Erro ao carregar dados do estudante', 'error');
      } finally {
        mostrarLoading(false);
      }
    }
    
    document.getElementById('formEstudante').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const id = document.getElementById('estudanteId').value;
      const estudante = {
        matricula: document.getElementById('matricula').value,
        nome: document.getElementById('nome').value,
        dataNascimento: document.getElementById('dataNascimento').value,
        turno: document.getElementById('turno').value,
        anoEscolar: document.getElementById('anoEscolar').value,
        deficiencia: document.getElementById('deficiencia').value,
        CID: document.getElementById('CID').value,
        descricao: document.getElementById('descricao').value
      };
      
      // Validações
      if (!estudante.matricula || !estudante.nome || !estudante.dataNascimento || 
          !estudante.turno || !estudante.deficiencia || !estudante.anoEscolar) {
        mostrarMensagem('Preencha todos os campos obrigatórios (*)', 'warning');
        return;
      }
      
      mostrarLoading(true);
      
      try {
        if (id) {
          await atualizarEstudante(id, estudante);
          mostrarMensagem('Estudante atualizado com sucesso!', 'success');
        } else {
          await criarEstudante(estudante);
          mostrarMensagem('Estudante cadastrado com sucesso!', 'success');
        }
        
        setTimeout(() => {
          window.location.href = 'javascript:history.back()';
        }, 1000);
        
      } catch (error) {
        console.error('Erro ao salvar:', error);
        mostrarMensagem('Erro ao salvar estudante', 'error');
      } finally {
        mostrarLoading(false);
      }
    });
    
    const estudanteId = getUrlParameter('id');
    if (estudanteId) {
      carregarEstudanteParaEdicao(estudanteId);
    }
  </script>
</body>
</html>
