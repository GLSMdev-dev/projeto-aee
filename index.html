<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="description" content="Sistema de Gestão AEE - Atendimento Educacional Especializado">
  <title>Sistema AEE - Professor</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .filters-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .filter-group {
      flex: 1;
      min-width: 150px;
    }
    .badge-pei {
      background: var(--primary-light);
      color: var(--primary-dark);
      padding: 0.25rem 0.5rem;
      border-radius: 20px;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div id="loading" class="loading"><div class="spinner"></div></div>
  
  <div id="modalConfirmacao" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Confirmar exclusão</h3>
        <button class="btn btn-sm" onclick="fecharModalConfirmacao()">✕</button>
      </div>
      <p id="confirmacaoMensagem">Tem certeza que deseja excluir este registro?</p>
      <div class="modal-footer">
        <button id="cancelarExclusao" class="btn">Cancelar</button>
        <button id="confirmarExclusao" class="btn btn-danger">Excluir</button>
      </div>
    </div>
  </div>
  
  <nav class="navbar">
    <h1>🏫 Sistema AEE - Professor</h1>
    <div class="nav-links">
      <span style="color: white;">👤 <span id="userNome"></span></span>
      <button id="btnLogout" class="btn btn-sm">Sair</button>
    </div>
  </nav>
  
  <div class="container">
    <div class="card">
      <div class="card-header">
        <h2>📚 Meus Estudantes</h2>
        <button id="btnAtualizar" class="btn btn-secondary btn-sm">🔄 Atualizar</button>
      </div>
      
      <div class="filters-row">
        <div class="filter-group"><input type="text" id="filtroNome" placeholder="🔍 Buscar por nome..." autocomplete="off"></div>
        <div class="filter-group"><select id="filtroAno"><option value="">Todos os anos</option></select></div>
        <div class="filter-group"><select id="filtroTurno"><option value="">Todos os turnos</option><option value="Manhã">Manhã</option><option value="Tarde">Tarde</option><option value="Noite">Noite</option><option value="Integral">Integral</option></select></div>
      </div>
      
      <div class="table-responsive">
        <table id="tabelaEstudantes">
          <thead>
             <tr>
              <th>Matrícula</th><th>Nome</th><th>Ano</th><th>Turno</th><th>Deficiência</th><th>CID</th><th>PEIs</th><th>Ações</th>
             </tr>
          </thead>
          <tbody id="listaEstudantes"><tr><td colspan="8" class="text-center">Carregando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  
  <script src="js/utils.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api-netlify.js"></script>
  <script>
    let estudantesCache = [];
    let peisCache = [];
    let currentUser = null;

    function verificarAuth() {
      const user = localStorage.getItem('user');
      if (!user) { window.location.href = 'login.html'; return null; }
      const userObj = JSON.parse(user);
      document.getElementById('userNome').textContent = userObj.nome;
      return userObj;
    }

    async function carregarDados() {
      const tbody = document.getElementById('listaEstudantes');
      tbody.innerHTML = '<tr><td colspan="8" class="text-center">Carregando...</td></tr>';
      try {
        estudantesCache = await listarEstudantes();
        peisCache = await listarPEIs();
        popularFiltros();
        aplicarFiltros();
      } catch (error) {
        console.error(error);
        tbody.innerHTML = '<tr><td colspan="8" class="text-center">❌ Erro ao carregar</td></tr>';
      }
    }

    function popularFiltros() {
      const anos = [...new Set(estudantesCache.map(e => e.anoEscolar).filter(a => a))];
      const selectAno = document.getElementById('filtroAno');
      selectAno.innerHTML = '<option value="">Todos os anos</option>' + anos.map(a => `<option value="${a}">${a}</option>`).join('');
    }

    function renderizarEstudantes(estudantes) {
      const tbody = document.getElementById('listaEstudantes');
      if (!estudantes || estudantes.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center">📭 Nenhum estudante cadastrado</td></tr>';
        return;
      }
      
      tbody.innerHTML = estudantes.map(estudante => {
        const peisEstudante = peisCache.filter(p => p.estudanteId == estudante.id);
        return `
          <tr>
            <td>${escapeHtml(estudante.matricula || '-')}</td>
            <td><strong>${escapeHtml(estudante.nome || '')}</strong></td>
            <td>${escapeHtml(estudante.anoEscolar || '-')}</td>
            <td>${escapeHtml(estudante.turno || '')}</td>
            <td>${escapeHtml(estudante.deficiencia || '')}</td>
            <td>${escapeHtml(estudante.CID || '-')}</td>
            <td><span class="badge-pei">${peisEstudante.length} PEI(s)</span></td>
            <td class="acoes">
              <button class="btn btn-sm btn-primary" onclick="criarPEI(${estudante.id})" title="Criar PEI">📄 Criar</button>
              <button class="btn btn-sm btn-warning" onclick="visualizarPEI(${estudante.id})" title="Ver PEIs">👁️ Ver</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function aplicarFiltros() {
      const filtroNome = document.getElementById('filtroNome')?.value.toLowerCase() || '';
      const filtroAno = document.getElementById('filtroAno')?.value || '';
      const filtroTurno = document.getElementById('filtroTurno')?.value || '';
      
      let filtrados = [...estudantesCache];
      if (filtroNome) filtrados = filtrados.filter(e => e.nome?.toLowerCase().includes(filtroNome));
      if (filtroAno) filtrados = filtrados.filter(e => e.anoEscolar === filtroAno);
      if (filtroTurno) filtrados = filtrados.filter(e => e.turno === filtroTurno);
      
      renderizarEstudantes(filtrados);
    }

    function criarPEI(estudanteId) { window.location.href = `pei.html?estudanteId=${estudanteId}`; }
    function visualizarPEI(estudanteId) { window.location.href = `visualizar-pei.html?estudanteId=${estudanteId}`; }

    document.getElementById('btnLogout').onclick = () => { localStorage.removeItem('user'); window.location.href = 'login.html'; };
    document.getElementById('btnAtualizar').onclick = () => carregarDados();
    document.getElementById('filtroNome')?.addEventListener('input', debounce(aplicarFiltros, 300));
    document.getElementById('filtroAno')?.addEventListener('change', aplicarFiltros);
    document.getElementById('filtroTurno')?.addEventListener('change', aplicarFiltros);

    currentUser = verificarAuth();
    if (currentUser) carregarDados();
  </script>
</body>
</html>
