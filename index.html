<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>PSAEE - Professor</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .filters-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .filter-group { flex: 1; min-width: 150px; }
    .badge-psaee { background: var(--primary-light); color: var(--primary-dark); padding: 0.25rem 0.5rem; border-radius: 20px; font-size: 0.75rem; }
    .historico-psaee { background: var(--gray-50); padding: 0.5rem; border-radius: var(--radius-sm); margin-top: 0.5rem; font-size: 0.75rem; }
  </style>
</head>
<body>
  <div id="loading" class="loading"><div class="spinner"></div></div>
  
  <div id="modalConfirmacao" class="modal">
    <div class="modal-content">
      <div class="modal-header"><h3>Confirmar exclusão</h3><button class="btn btn-sm" onclick="fecharModalConfirmacao()">✕</button></div>
      <p id="confirmacaoMensagem">Tem certeza que deseja excluir este registro?</p>
      <div class="modal-footer"><button id="cancelarExclusao" class="btn">Cancelar</button><button id="confirmarExclusao" class="btn btn-danger">Excluir</button></div>
    </div>
  </div>
  
  <nav class="navbar">
    <div>
      <h1>🏫 Sistema - PSAEE</h1>
      <p style="font-size: 0.75rem; margin-top: 0.25rem; opacity: 0.9;">Planejamento Semanal do Atendimento Educacional Especializado</p>
    </div>
    <div class="nav-links"><span style="color: white; display: flex; align-items: center; gap: 0.5rem;"><img src="assets/nacinzo.png" alt="Ícone" style="height: 24px; width: auto; border-radius: 50%;"><span id="userNome"></span></span><button id="btnLogout" class="btn btn-sm">Sair</button></div>
  </nav>
  
  <div class="container">
    <div class="card">
      <div class="card-header"><h2>📚 Meus Estudantes</h2><button id="btnAtualizar" class="btn btn-secondary btn-sm">🔄 Atualizar</button></div>
      
      <div class="filters-row">
        <div class="filter-group"><input type="text" id="filtroNome" placeholder="🔍 Buscar por nome..."></div>
        <div class="filter-group"><select id="filtroAno"><option value="">Todos os anos</option></select></div>
        <div class="filter-group"><select id="filtroTurno"><option value="">Todos os turnos</option><option value="Manhã">Manhã</option><option value="Tarde">Tarde</option><option value="Noite">Noite</option><option value="Integral">Integral</option></select></div>
      </div>
      
      <div class="table-responsive">
         <table>
          <thead>
                <tr><th>Matrícula</th><th>Nome</th><th>Ano</th><th>Turno</th><th>Deficiência</th><th>CID</th><th>PSAEEs</th><th>Ações</th></tr>
          </thead>
          <tbody id="listaEstudantes"><tr><td colspan="8" class="text-center">Carregando...</td></tr>
          </tbody>
         </table>
      </div>
    </div>
  </div>
  
  <script src="js/utils.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api-netlify.js"></script>
  <script>
    function escapeHtml(t){if(!t)return'';const e=document.createElement('div');return e.textContent=t,e.innerHTML}
    function formatarData(e){if(!e)return'';const t=new Date(e);return isNaN(t.getTime())?e:t.toLocaleDateString('pt-BR')}
    function fecharModalConfirmacao(){document.getElementById('modalConfirmacao').classList.remove('active')}
    
    let estudantesCache=[], peisCache=[], currentUser=null;
    
    function verificarAuth(){const e=localStorage.getItem('user');if(!e){window.location.href='login.html';return null}const t=JSON.parse(e);document.getElementById('userNome').textContent=t.nome;return t}
    
    async function carregarDados(){const e=document.getElementById('listaEstudantes');e.innerHTML='<tr><td colspan="8" class="text-center">Carregando...</td></tr>';try{estudantesCache=await listarEstudantes();peisCache=await listarPEIs();console.log('Estudantes carregados:', estudantesCache);popularFiltros();aplicarFiltros()}catch(t){console.error(t),e.innerHTML='<tr><td colspan="8" class="text-center">❌ Erro ao carregar</td></tr>'}finally{mostrarLoading(false)}}
    
    function popularFiltros(){const e=[...new Set(estudantesCache.map(e=>e.anoEscolar).filter(e=>e))];document.getElementById('filtroAno').innerHTML='<option value="">Todos os anos</option>'+e.map(e=>`<option value="${e}">${e}</option>`).join('')}
    
    function renderizarEstudantes(e){const t=document.getElementById('listaEstudantes');if(!e||0===e.length){t.innerHTML='<tr><td colspan="8" class="text-center">📭 Nenhum estudante cadastrado</td></tr>';return}const n=peisCache.reduce((e,t)=>(e[t.estudanteId]=(e[t.estudanteId]||0)+1,e),{});t.innerHTML=e.map(e=>{const t=peisCache.filter(t=>t.estudanteId==e.id).map(e=>e.dataCriacao?.split(' ')[0]||'sem data').join(', ');console.log('Renderizando estudante:', e.id, e.nome);return`<tr><td>${escapeHtml(e.matricula||'-')}</td><td><strong>${escapeHtml(e.nome)}</strong><div class="historico-psaee">📅 ${t||'Nenhum PSAEE'}</div></td><td>${escapeHtml(e.anoEscolar||'-')}</td><td>${escapeHtml(e.turno)}</td><td>${escapeHtml(e.deficiencia)}</td><td>${escapeHtml(e.CID||'-')}</td><td><span class="badge-psaee">${n[e.id]||0} PSAEE(s)</span></td><td class="acoes"><button class="btn btn-sm btn-primary" onclick="criarPEI(${e.id})">📄 Novo PSAEE</button><button class="btn btn-sm btn-warning" onclick="visualizarPEI(${e.id})">👁️ Ver PSAEEs</button></td></tr>`}).join('')}
    
    function aplicarFiltros(){const e=document.getElementById('filtroNome')?.value.toLowerCase()||'',t=document.getElementById('filtroAno')?.value||'',n=document.getElementById('filtroTurno')?.value||'';let o=[...estudantesCache];e&&(o=o.filter(t=>t.nome?.toLowerCase().includes(e))),t&&(o=o.filter(e=>e.anoEscolar===t)),n&&(o=o.filter(e=>e.turno===n)),renderizarEstudantes(o)}
    
    function criarPEI(e){console.log('criarPEI chamado com ID:', e, 'tipo:', typeof e);if(!e || e === undefined || e === null || e === 'undefined'){console.error('estudanteId inválido');mostrarMensagem('Erro: ID do estudante não encontrado','error');return}window.location.href=`pei.html?estudanteId=${e}`}
    function visualizarPEI(e){console.log('visualizarPEI chamado com ID:', e);if(!e||e===undefined){console.error('estudanteId inválido');return}window.location.href=`visualizar-pei.html?estudanteId=${e}`}
    
    document.getElementById('btnLogout').onclick=()=>{localStorage.removeItem('user'),window.location.href='login.html'}
    document.getElementById('btnAtualizar').onclick=()=>carregarDados()
    document.getElementById('filtroNome')?.addEventListener('input',debounce(aplicarFiltros,300))
    document.getElementById('filtroAno')?.addEventListener('change',aplicarFiltros)
    document.getElementById('filtroTurno')?.addEventListener('change',aplicarFiltros)
    
    currentUser=verificarAuth(),currentUser&&carregarDados()
  </script>
</body>
</html>
